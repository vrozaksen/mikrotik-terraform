# dotrepos:begin .yamllint.yaml@8aa5913484d4487f27eb30f32c059a5e8d2dc797
---
extends: default
ignore: |
  .git/
  .github/workflows/
  .forgejo/workflows/
  node_modules/
  venv/
  target/
  .direnv/
  .terragrunt-cache/
  # dotrepos:slot extra-ignore
rules:
  indentation:
    spaces: 2
    indent-sequences: whatever
  line-length:
    max: 120
    level: warning
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  braces:
    level: warning
    max-spaces-inside: 1
  brackets:
    level: warning
    max-spaces-inside: 1
  truthy:
    check-keys: false
  octal-values:
    forbid-implicit-octal: true
# dotrepos:end
