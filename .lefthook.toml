[[remotes]]
git_url = "https://git.vzkn.eu/vrozaksen/dotrepos.git"
ref     = "main"
configs = ["lefthook.toml"]

# ── via mise (opentofu, terragrunt declared in .mise.toml) ────────────────

[pre-commit.commands.format-tofu]
run = "mise exec -- tofu fmt {staged_files}"
glob = ["*.tf"]
stage_fixed = true

[pre-commit.commands.format-terragrunt]
run = "mise exec -- terragrunt hcl format {staged_files}"
glob = ["*.hcl"]
stage_fixed = true
