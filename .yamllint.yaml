# dotrepos:begin .yamllint.yaml@2208c1024c61defa6e01b4fb5a70687ebc4e215a
---
extends: default
ignore: |
  .git/
  .github/workflows/
  .forgejo/workflows/
  node_modules/
  venv/
  target/
  .direnv/
  .terragrunt-cache/
rules:
  indentation:
    spaces: 2
    indent-sequences: whatever
  line-length:
    max: 120
    level: warning
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  braces:
    level: warning
    max-spaces-inside: 1
  brackets:
    level: warning
    max-spaces-inside: 1
  truthy:
    check-keys: false
  octal-values:
    forbid-implicit-octal: true
# dotrepos:end
