# yaml-language-server: $schema=https://json.schemastore.org/yamllint.json
extends: default
# .github/workflows/ is on its way out (Forgejo Actions ports live in
# .forgejo/workflows/); skip its legacy formatting drift until deletion.
ignore: |
  .github/workflows/
  **/.terragrunt-cache/
rules:
  comments:
    min-spaces-from-content: 1
  line-length:
    max: 200
  braces:
    level: warning
    max-spaces-inside: 1
  brackets:
    level: warning
    max-spaces-inside: 1
  truthy:
    ignore:
      - ".github/workflows/*"
      - ".forgejo/workflows/*"
