name: Lint
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
  pull_request:
jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install actionlint
        env:
          # renovate: datasource=github-releases depName=rhysd/actionlint
          ACTIONLINT_VERSION: "1.7.12"
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin actionlint
      - name: Run actionlint
        run: actionlint
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install yamllint
        env:
          # renovate: datasource=pypi depName=yamllint
          YAMLLINT_VERSION: "1.38.0"
        run: |
          pipx install "yamllint==${YAMLLINT_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run yamllint
        run: yamllint . -c .yamllint.yaml
  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install OpenTofu
        env:
          # renovate: datasource=github-releases depName=opentofu/opentofu
          TOFU_VERSION: "1.12.0"
        run: |
          curl -fsSL "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.zip" -o /tmp/tofu.zip
          sudo unzip -o /tmp/tofu.zip tofu -d /usr/local/bin
          rm /tmp/tofu.zip
      - name: Run tofu fmt
        run: tofu fmt -recursive -check
  terragrunt-fmt:
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Terragrunt
        env:
          # renovate: datasource=github-releases depName=gruntwork-io/terragrunt
          TERRAGRUNT_VERSION: "1.0.5"
        run: |
          sudo curl -fsSL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt
          sudo chmod +x /usr/local/bin/terragrunt
      - name: Run terragrunt hcl format
        run: terragrunt hcl format --check
